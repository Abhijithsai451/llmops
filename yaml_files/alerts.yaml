groups:
  - name: llm-aiops-alerts
    rules:

      # ── Latency ────────────────────────────────────────────────────────────
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, rate(llm_latency_seconds_bucket[2m])) > 2
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "P95 latency above 2s"
          description: "95th-percentile latency is {{ $value | printf \"%.2f\" }}s — users are experiencing slow responses."

      - alert: ElevatedLatencyP50
        expr: histogram_quantile(0.50, rate(llm_latency_seconds_bucket[2m])) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Median latency above 1s"
          description: "Median latency is {{ $value | printf \"%.2f\" }}s — possible backend degradation."

      # ── Error Rate ─────────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          rate(llm_errors_total[2m]) /
          (rate(llm_requests_total[2m]) + 0.001) > 0.20
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 20%"
          description: "{{ $value | humanizePercentage }} of requests are failing."

      - alert: ElevatedErrorRate
        expr: |
          rate(llm_errors_total[2m]) /
          (rate(llm_requests_total[2m]) + 0.001) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Error rate above 5%"
          description: "{{ $value | humanizePercentage }} of requests are failing."

      # ── Traffic ────────────────────────────────────────────────────────────
      - alert: HighTraffic
        expr: rate(llm_requests_total[1m]) * 60 > 100
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Request rate above 100/min"
          description: "Current rate: {{ $value | printf \"%.0f\" }} req/min."

      - alert: TrafficSpike
        expr: |
          rate(llm_requests_total[1m]) /
          (rate(llm_requests_total[10m]) + 0.001) > 3
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Sudden traffic spike (3x baseline)"
          description: "Request rate jumped to 3× the 10-minute baseline."

      # ── Backend Health ─────────────────────────────────────────────────────
      - alert: BackendDown
        expr: llm_backend_healthy == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "vLLM backend is down"
          description: "The vLLM inference backend has been unreachable for >15s."

      - alert: CircuitBreakerOpen
        expr: llm_circuit_breaker_open == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker is OPEN"
          description: "Too many consecutive vLLM failures — circuit breaker opened, routing to local fallback."

      # ── Throughput ─────────────────────────────────────────────────────────
      - alert: LowTokenThroughput
        expr: llm_tokens_per_second < 1 and rate(llm_requests_total[2m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Token throughput below 1 tok/s"
          description: "Current throughput: {{ $value | printf \"%.2f\" }} tok/s — model may be overloaded."

      # ── Active Requests ────────────────────────────────────────────────────
      - alert: ActiveRequestsHigh
        expr: llm_active_requests > 20
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "More than 20 concurrent requests"
          description: "{{ $value }} requests in-flight — possible queue buildup."
